# .lychee.toml — lychee link checker configuration
# See: https://github.com/lycheeverse/lychee

# Check HTML files in the generated titles directory
glob_ignore_case = true
no_progress = true
max_cache_age = "2d"
cache = true

# Timeout for external requests (seconds)
timeout = 60

# Accept these status codes as valid
# 403 included because many doc sites (developers.redhat.com, entra.microsoft.com) block crawlers
accept = [200, 204, 301, 302, 403]

# Skip SSL certificate verification (matches htmltest IgnoreSSLVerify)
insecure = true

# Exclude patterns (migrated from .htmltest.yml IgnoreURLs)
exclude = [
  "^./main/index\\.html$",
  "^./1\\.1\\.x/index\\.html$",
  "^./1\\.2\\.x/index\\.html$",
  "^./pr-.*/index\\.html$",
  "^./release-1\\..*/index\\.html$",
  "^./rhdh-1\\.0/index\\.html$",
  "^./rhdh-1\\.1\\.x/index\\.html$",
  "^index\\.html$",
  "^pulls\\.html$",
  "http://creativecommons\\.org/licenses/by-sa/3\\.0/",
  "https://developers\\.redhat\\.com",
  "https://docs\\.github\\.com/",
  "https://docs\\.redhat\\.com/en/documentation/red_hat_developer_hub/1\\.9",
  "https://entra\\.microsoft\\.com",
  "https://github\\.com/redhat-developer/rhdh-chart/blob/release-1\\.9/",
  "https://github\\.com/redhat-developer/rhdh-examples/tree/main/plugins/",
  "https://github\\.com/redhat-developer/rhdh-operator/blob/release-1\\.9/",
  "https://github\\.com/redhat-developer/rhdh/blob/release-1\\..*/",
  "https://grafana\\.com/docs/loki/",
  "https://npm\\.registry\\.redhat\\.com",
  "https://npmjs\\.com/package/",
  "https://openai\\.com/api/",
  "https://platform\\.openai\\.com/docs/",
  "https://raw\\.githubusercontent\\.com/redhat-developer/rhdh/release-1\\..*/",
  "http://localhost:3000/",
  "https://docs\\.redhat\\.com/en/documentation/red_hat_openshift_serverless/",
  "https://github\\.com/redhat-developer/rhdh/blob/main/dynamic-plugins\\.default\\.yaml",
]
