# Error pattern catalog for the build orchestrator.
# Each pattern maps a regex to a human-friendly cause and fix suggestion.
# The {match} placeholder in cause/fix is replaced with the first capture group.

patterns:
  # --- AsciiDoc / ccutil errors ---
  - id: invalid-xref
    regex: "invalid (cross reference|xref)\\s+'([^']+)'"
    cause: "Cross-reference target '{match}' not found in document"
    fix: "Check that the xref ID exists and matches the anchor in the target file"

  - id: missing-include
    regex: "include file not found:\\s+(.+)"
    cause: "Included file '{match}' does not exist"
    fix: "Verify the include path is correct relative to the document root"

  - id: unknown-id
    regex: "Unknown ID '([^']+)'"
    cause: "ccutil cannot resolve ID '{match}'"
    fix: "Ensure the referenced ID is defined in an included file"

  - id: fails-to-validate
    regex: "fails to validate"
    cause: "Document structure validation failed"
    fix: "Run 'ccutil compile' locally and check the full error output"

  - id: asciidoctor-warning
    regex: "asciidoctor: WARNING:\\s+(.+)"
    cause: "Asciidoctor warning: {match}"
    fix: "Review the warning and fix the AsciiDoc source"

  - id: asciidoctor-error
    regex: "asciidoctor: ERROR:\\s+(.+)"
    cause: "Asciidoctor error: {match}"
    fix: "Fix the AsciiDoc syntax error in the source file"

  # --- Podman / container errors ---
  - id: podman-pull-error
    regex: "Error:.*(image|unable to pull|trying to pull)"
    cause: "Podman could not pull the ccutil container image"
    fix: "Check network connectivity and that quay.io/ivanhorvath/ccutil:amazing is accessible"

  - id: podman-oom
    regex: "out of memory|OOM|Cannot allocate memory"
    cause: "Container ran out of memory"
    fix: "Reduce --jobs concurrency or increase available memory"

  - id: permission-denied
    regex: "Permission denied|EACCES"
    cause: "File permission error, likely SELinux or volume mount issue"
    fix: "Ensure Podman volume mount uses :z flag and files are readable"

  - id: missing-master-adoc
    regex: "master\\.adoc.*not found|No such file"
    cause: "The master.adoc entry point is missing"
    fix: "Verify the title directory contains a master.adoc file"

  # --- htmltest errors ---
  - id: htmltest-broken-link
    regex: "target does not exist"
    cause: "Internal link points to a non-existent target"
    fix: "Check the href in the generated HTML and fix the source xref"

  - id: htmltest-external-timeout
    regex: "request timeout|connection refused"
    cause: "External URL is unreachable or timed out"
    fix: "Add the URL to .htmltest.yml IgnoreURLs if it's a known false positive"
