name: GitHub Pages

on:
  push:
    branches:
    - main
    - rhdh-1.**
    - 1.**.x
    - release-1.**

jobs:
  adoc_build:
    name: Asciidoctor Build For GH Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup environment
      run: |
        # update
        sudo apt-get update -y || true
        # install
        sudo apt-get -y -q install podman && podman --version
        echo "GIT_BRANCH=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_ENV

    - name: Install lychee
      run: |
        LYCHEE_VERSION="v0.23.0"
        curl -sSfL "https://github.com/lycheeverse/lychee/releases/download/lychee-${LYCHEE_VERSION}/lychee-x86_64-unknown-linux-gnu.tar.gz" \
          | sudo tar xz -C /usr/local/bin lychee
        lychee --version

    - name: Restore lychee cache
      uses: actions/cache@v4
      with:
        path: .lycheecache
        key: lychee-${{ github.ref_name }}-${{ github.sha }}
        restore-keys: |
          lychee-${{ github.ref_name }}-
          lychee-

    - name: Build guides and indexes
      id: build
      env:
        GITHUB_TOKEN: ${{ secrets.RHDH_BOT_TOKEN }}
      run: |
        echo "Building branch ${{ env.GIT_BRANCH }}"
        touch .lycheecache
        node build/scripts/build-orchestrator.js -b ${{ env.GIT_BRANCH }} --no-cqa

    - name: Deploy to the gh-pages branch
      env:
        GITHUB_TOKEN: ${{ secrets.RHDH_BOT_TOKEN }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: bash build/scripts/deploy-gh-pages.sh ./titles-generated --message "Deploy ${{ env.GIT_BRANCH }}"
