name: Generate update PR for the Dynamic Plugins tables

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run the script from"
        required: true
        default: "main"
  # Weekly: Monday 04:00 UTC (~ Sunday 11pm Eastern / 8pm Pacific). Scheduled workflows use the default branch YAML.
  schedule:
    - cron: "0 4 * * 1"

jobs:
  run-script:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Add or remove rows when release branches change. Job can only run for branches listed here.
          - target_branch: main
            script_path: modules/extend_dynamic-plugins-reference/rhdh-supported-plugins.sh
          - target_branch: release-1.8
            script_path: modules/dynamic-plugins/rhdh-supported-plugins.sh
          - target_branch: release-1.9
            script_path: modules/extend_dynamic-plugins-reference/rhdh-supported-plugins.sh
    steps:
      # matrix is not available in job-level `if`, so we gate steps with this output instead.
      - name: Decide whether this matrix leg should run
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          TARGET_BRANCH: ${{ matrix.target_branch }}
          INPUT_BRANCH: ${{ github.event.inputs.branch }}
        run: |
          if [ "$EVENT_NAME" = "schedule" ] || [ "$TARGET_BRANCH" = "$INPUT_BRANCH" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ matrix.target_branch }}
          fetch-depth: 0

      - name: Install PIP `yq`
        if: steps.gate.outputs.run == 'true'
        run: |
          python3 -m pip install --upgrade pip
          pip install yq
          echo "Installed `yq` version: $(yq --version)"

      - name: Set up Git user
        if: steps.gate.outputs.run == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate timestamp
        if: steps.gate.outputs.run == 'true'
        run: echo "TIMESTAMP=$(date +'%Y%m%d-%H%M%S' -u)" >> $GITHUB_ENV

      - name: Run the script on branch
        if: steps.gate.outputs.run == 'true'
        run: bash ${{ matrix.script_path }} -b ${{ matrix.target_branch }}

      - name: Create Pull Request
        if: steps.gate.outputs.run == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          commit-message: "chore: automated update of supported plugins list"
          title: "Automated update of supported plugins list for ${{ matrix.target_branch }}"
          body: "This PR was automatically generated by running rhdh-supported-plugins.sh."
          branch: "update-${{ matrix.target_branch }}-${{ env.TIMESTAMP }}"
          base: ${{ matrix.target_branch }}
